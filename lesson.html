<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课时 - CourseHub</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <style>
        #lesson-container {
            max-width: 100%;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
        }

        /* Tab 导航 */
        .tab-nav {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 0 1rem;
            flex-shrink: 0;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            border-right: 1px solid var(--border-color);
            margin-right: 0.5rem;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #f3f4f6;
        }

        .tab-btn {
            padding: 1rem 1.5rem;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1rem;
            color: var(--secondary-color);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: var(--primary-color);
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .fullscreen-btn {
            margin-left: auto;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--secondary-color);
            cursor: pointer;
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            transition: all 0.2s;
        }

        .fullscreen-btn:hover {
            background: #f3f4f6;
            color: var(--primary-color);
        }

        /* Tab 内容区 */
        .tab-content {
            flex: 1;
            display: none;
            overflow: hidden;
            min-height: 0;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* PPT 全屏 */
        #ppt-content {
            height: 100%;
        }

        #ppt-container {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
        }

        #ppt-iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 加载状态 */
        .loading, .error, .not-found {
            padding: 3rem;
            text-align: center;
            color: var(--secondary-color);
        }

        .error {
            color: #dc2626;
        }

        /* 教案和作业内容区 */
        #lesson-markdown, #homework-content {
            height: 100%;
            overflow-y: auto;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .tab-btn {
                padding: 0.75rem 1rem;
                font-size: 0.9rem;
            }

            .back-btn {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div id="lesson-container">
        <nav class="tab-nav">
            <button id="back-btn" class="back-btn">
                ← 返回
            </button>
            <button class="tab-btn active" data-tab="ppt">PPT</button>
            <button class="tab-btn" data-tab="lesson">教案</button>
            <button class="tab-btn" data-tab="homework">作业</button>
            <button id="fullscreen-btn" class="fullscreen-btn" title="全屏模式">
                ⛶ 全屏
            </button>
        </nav>

        <div id="ppt-content" class="tab-content active">
            <div id="ppt-container">
                <iframe id="ppt-iframe" allow="fullscreen"></iframe>
            </div>
        </div>

        <div id="lesson-content" class="tab-content">
            <div id="lesson-markdown">
                <div class="loading">加载教案中...</div>
            </div>
        </div>

        <div id="homework-content" class="tab-content">
            <div class="loading">加载作业中...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module">
        import COURSES_DATA from './scripts/courses-data.js';
        import { LaserPointer } from './scripts/laser-pointer.js';

        function escapeHTML(str) {
            if (typeof str !== 'string') return str;
            return str.replace(/[&<>"']/g, function(match) {
                const escapeMap = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                };
                return escapeMap[match];
            });
        }

        // Tab 切换
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;

                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));

                btn.classList.add('active');
                document.getElementById(`${tab}-content`).classList.add('active');
            });
        });

        // 全屏功能
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
                fullscreenBtn.innerHTML = '⛶ 退出';
            } else {
                document.exitFullscreen();
                fullscreenBtn.innerHTML = '⛶ 全屏';
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.innerHTML = '⛶ 全屏';
            }
        });

        // 返回按钮
        const backBtn = document.getElementById('back-btn');
        backBtn.addEventListener('click', () => {
            if (courseSlug) {
                window.location.href = `course.html?slug=${encodeURIComponent(courseSlug)}`;
            } else {
                window.location.href = 'index.html';
            }
        });

        // 获取 URL 参数
        const params = new URLSearchParams(window.location.search);
        const courseSlug = params.get('course');
        const lessonSlug = params.get('lesson');

        const course = COURSES_DATA.find(c => c.slug === courseSlug);
        const lesson = course?.lessons.find(l => l.slug === lessonSlug);

        if (!lesson) {
            document.getElementById('lesson-markdown').innerHTML = '<div class="error">课时未找到</div>';
        } else {
            document.title = `${escapeHTML(lesson.title)} - ${escapeHTML(course.title)} - CourseHub`;

            // 加载教案
            const lessonPath = `courses/${encodeURIComponent(courseSlug)}/${encodeURIComponent(lessonSlug)}`;
            const markdownPath = `${lessonPath}/教案.md`;

            fetch(markdownPath)
                .then(r => {
                    if (!r.ok) throw new Error('Failed to load');
                    return r.text();
                })
                .then(content => {
                    // 移除 YAML front matter
                    const frontMatterRegex = /^---\n[\s\S]*?\n---\n/;
                    const cleanContent = content.replace(frontMatterRegex, '');
                    document.getElementById('lesson-markdown').innerHTML = marked.parse(cleanContent);
                })
                .catch(() => {
                    document.getElementById('lesson-markdown').innerHTML = '<div class="error">教案加载失败</div>';
                });

            // 加载 PPT
            document.getElementById('ppt-iframe').src = `${lessonPath}/index.html`;

            // 加载作业
            const homeworkPath = `${lessonPath}/作业.md`;
            fetch(homeworkPath)
                .then(r => {
                    if (!r.ok) throw new Error('Homework not found');
                    return r.text();
                })
                .then(content => {
                    document.getElementById('homework-content').innerHTML = marked.parse(content);
                })
                .catch(() => {
                    document.getElementById('homework-content').innerHTML = '<div class="not-found">暂无作业</div>';
                });

            // 初始化激光笔（仅 PPT 区域）
            const pptContainer = document.getElementById('ppt-container');
            new LaserPointer(pptContainer);
        }
    </script>
</body>
</html>
