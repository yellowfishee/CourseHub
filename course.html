<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程概览 - CourseHub</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>
<body>
    <div id="course-page">
        <header id="course-header">
            <div class="course-header-content">
                <a href="index.html" class="back-link">← 返回课程列表</a>
                <div class="header-row">
                    <div class="bot-avatar">🤖</div>
                    <div>
                        <h1 id="course-title">加载中...</h1>
                        <p id="course-description" class="course-description"></p>
                    </div>
                </div>
            </div>
        </header>

        <main id="course-body">
            <div class="lesson-search">
                <span class="lesson-search-icon">🔍</span>
                <input type="text" id="lesson-search-input" placeholder="搜索课时..." autocomplete="off">
            </div>
            <h2>课时列表</h2>
            <div id="lesson-list"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="scripts/course.js"></script>
</body>
</html>
