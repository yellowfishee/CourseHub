<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>常用标签</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 2rem; background: #fff8e7; }
        h1 { color: #1572b6; }
        table { border-collapse: collapse; width: 100%; }
        td, th { border: 1px solid #ddd; padding: 8px; }
        th { background: #1572b6; color: white; }
    </style>
</head>
<body>
    <h1>常用 HTML 标签</h1>
    <table>
        <tr><th>标签</th><th>作用</th></tr>
        <tr><td>&lt;h1&gt;-&lt;h6&gt;</td><td>标题</td></tr>
        <tr><td>&lt;p&gt;</td><td>段落</td></tr>
        <tr><td>&lt;a&gt;</td><td>链接</td></tr>
        <tr><td>&lt;img&gt;</td><td>图片</td></tr>
        <tr><td>&lt;div&gt;</td><td>区块</td></tr>
    </table>
</body>
</html>
