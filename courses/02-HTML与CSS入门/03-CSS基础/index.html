<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CSS基础</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 2rem; background: #e7f3ff; }
        h1 { color: #1572b6; }
        .code { background: #2d2d2d; color: #fff; padding: 1rem; border-radius: 8px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>CSS 基础</h1>
    <p>Cascading Style Sheets</p>
    <div class="code">
        selector &#123;<br>
        &nbsp;&nbsp;property: value;<br>
        &#125;
    </div>
    <p>选择器 &#123; 属性: 值; &#125;</p>
</body>
</html>
